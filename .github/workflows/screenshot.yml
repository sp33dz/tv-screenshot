# ╔══════════════════════════════════════════════════════════════╗
# ║  .github/workflows/screenshot.yml                           ║
# ║  TradingView Auto Screenshot System — GitHub Actions         ║
# ╚══════════════════════════════════════════════════════════════╝

name: TradingView Auto Screenshot

on:
  # schedule:
  #   - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug logging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: screenshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  screenshot:
    name: Capture & Sync
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      RCLONE_CONF:        ${{ secrets.RCLONE_CONF }}
      GALLERY_PASSWORD:   ${{ secrets.GALLERY_PASSWORD }}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install chromium --with-deps

      - name: Write TradingView session cookies
        env:
          TV_SESSION_JSON: ${{ secrets.TV_SESSION_JSON }}
        run: |
          mkdir -p ~/.pw_tv_profiles/Default
          python - << 'PY_EOF'
          import os, json, pathlib

          session_raw = os.environ.get("TV_SESSION_JSON", "").strip()
          if not session_raw:
              print("WARNING: TV_SESSION_JSON secret is empty — will run without session")
          else:
              try:
                  cookies = json.loads(session_raw)
                  out_path = pathlib.Path.home() / ".pw_tv_profiles" / "Default" / "cookies.json"
                  out_path.write_text(json.dumps(cookies, ensure_ascii=False, indent=2), encoding="utf-8")
                  print(f"Session cookies written -> {out_path}  ({len(cookies)} entries)")
              except json.JSONDecodeError as e:
                  print(f"ERROR: TV_SESSION_JSON is not valid JSON: {e}")
                  raise SystemExit(1)
          PY_EOF

      - name: Write stocks list from secret
        env:
          STOCKS_JSON: ${{ secrets.STOCKS_JSON }}
        run: |
          python - << 'PY_EOF'
          import os, json, pathlib

          stocks_raw = os.environ.get("STOCKS_JSON", "").strip()
          if not stocks_raw:
              print("INFO: STOCKS_JSON secret is empty — using stocks from config.json")
          else:
              try:
                  stocks = json.loads(stocks_raw)
                  cfg_path = pathlib.Path("config.json")
                  if cfg_path.exists():
                      cfg = json.loads(cfg_path.read_text(encoding="utf-8"))
                  else:
                      cfg = {}
                  cfg["stocks"] = stocks
                  cfg_path.write_text(json.dumps(cfg, ensure_ascii=False, indent=2), encoding="utf-8")
                  print(f"Stocks list updated in config.json: {len(stocks)} symbols")
              except json.JSONDecodeError as e:
                  print(f"ERROR: STOCKS_JSON is not valid JSON: {e}")
                  raise SystemExit(1)
          PY_EOF

      - name: Restore gallery data.json for history merge
        run: |
          # gallery/data.json is committed to the repo and contains the full
          # accumulated image index from all previous runs.  Ensure the gallery/
          # directory exists so GalleryManager can read it before building.
          mkdir -p gallery
          if [ -f gallery/data.json ]; then
            ENTRY_COUNT=$(python -c "import json,sys; d=json.load(open('gallery/data.json')); print(d.get('total_files',0))" 2>/dev/null || echo "?")
            echo "Existing gallery/data.json found — ${ENTRY_COUNT} historical entries will be preserved"
          else
            echo "No existing gallery/data.json — first run, starting fresh"
          fi

      - name: Run screenshot
        id: run_screenshot
        continue-on-error: true
        env:
          TV_SESSION_JSON:    ${{ secrets.TV_SESSION_JSON }}
          STOCKS_JSON:        ${{ secrets.STOCKS_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RCLONE_CONF:        ${{ secrets.RCLONE_CONF }}
          GALLERY_PASSWORD:   ${{ secrets.GALLERY_PASSWORD }}
        run: |
          DEBUG_FLAG=""
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            DEBUG_FLAG="--debug"
          fi
          python main.py --screenshot $DEBUG_FLAG

      - name: Log screenshot result
        if: always()
        run: |
          if [ "${{ steps.run_screenshot.outcome }}" = "success" ]; then
            echo "Screenshot step completed successfully"
          else
            echo "Screenshot step had errors (some symbols may have failed)"
          fi

          echo "====== app.log (full) ======"
          if [ -f app.log ]; then
            cat app.log
          else
            echo "(app.log not found)"
          fi

          echo ""
          echo "====== Drive sidecar files ======"
          find screenshots/ -name "*.drive" -o -name "*.driveurl" 2>/dev/null \
            | sort | while read f; do
              echo "$f => $(cat \"$f\" 2>/dev/null)"
            done || echo "(no sidecar files found)"

          echo ""
          echo "====== Screenshots captured this run ======"
          find screenshots/ -name "*.png" 2>/dev/null | sort || echo "(none)"

      - name: Commit and push gallery
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # gallery HTML + data.json  (data.json คือ accumulated index — MUST commit every run)
          git add gallery/data.json gallery/index.html gallery/replay.html --ignore-errors || true
          git add gallery/ --ignore-errors || true

          # sidecar files (.drive และ .driveurl) เพื่อให้ gallery อ่าน Drive URL ได้
          find screenshots/ -name "*.drive" -o -name "*.driveurl" 2>/dev/null \
            | xargs git add --ignore-errors 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new files — skipping commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            # Count total entries in updated data.json
            TOTAL=$(python -c "import json; d=json.load(open('gallery/data.json')); print(d.get('total_files',0))" 2>/dev/null || echo "?")
            git commit -m "chore: auto-update gallery ${TIMESTAMP} [${TOTAL} entries] [skip ci]"
            git push origin HEAD
            echo "Gallery pushed to repo (${TOTAL} total entries in data.json)"
          fi

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            screenshots/
            gallery/
            app.log
            logs/
          retention-days: 3
          if-no-files-found: ignore
