# ╔══════════════════════════════════════════════════════════════╗
# ║  .github/workflows/screenshot.yml                           ║
# ║  TradingView Auto Screenshot System — GitHub Actions         ║
# ╚══════════════════════════════════════════════════════════════╝

name: TradingView Auto Screenshot

on:
  # schedule:
  #   - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug logging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: screenshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  screenshot:
    name: Capture & Sync
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      RCLONE_CONF:        ${{ secrets.RCLONE_CONF }}
      GALLERY_PASSWORD:   ${{ secrets.GALLERY_PASSWORD }}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install chromium --with-deps

      - name: Write TradingView session cookies
        env:
          TV_SESSION_JSON: ${{ secrets.TV_SESSION_JSON }}
        run: |
          mkdir -p ~/.pw_tv_profiles/Default
          python - << 'PY_EOF'
          import os, json, pathlib

          session_raw = os.environ.get("TV_SESSION_JSON", "").strip()
          if not session_raw:
              print("WARNING: TV_SESSION_JSON secret is empty — will run without session")
          else:
              try:
                  cookies = json.loads(session_raw)
                  out_path = pathlib.Path.home() / ".pw_tv_profiles" / "Default" / "cookies.json"
                  out_path.write_text(json.dumps(cookies, ensure_ascii=False, indent=2), encoding="utf-8")
                  print(f"Session cookies written -> {out_path}  ({len(cookies)} entries)")
              except json.JSONDecodeError as e:
                  print(f"ERROR: TV_SESSION_JSON is not valid JSON: {e}")
                  raise SystemExit(1)
          PY_EOF

      - name: Write stocks list from secret
        env:
          STOCKS_JSON: ${{ secrets.STOCKS_JSON }}
        run: |
          python - << 'PY_EOF'
          import os, json, pathlib

          stocks_raw = os.environ.get("STOCKS_JSON", "").strip()
          if not stocks_raw:
              print("INFO: STOCKS_JSON secret is empty — using stocks from config.json")
          else:
              try:
                  stocks = json.loads(stocks_raw)
                  cfg_path = pathlib.Path("config.json")
                  if cfg_path.exists():
                      cfg = json.loads(cfg_path.read_text(encoding="utf-8"))
                  else:
                      cfg = {}
                  cfg["stocks"] = stocks
                  cfg_path.write_text(json.dumps(cfg, ensure_ascii=False, indent=2), encoding="utf-8")
                  print(f"Stocks list updated in config.json: {len(stocks)} symbols")
              except json.JSONDecodeError as e:
                  print(f"ERROR: STOCKS_JSON is not valid JSON: {e}")
                  raise SystemExit(1)
          PY_EOF

      - name: Restore sidecar files from repo
        run: |
          # สร้าง folder structure จาก sidecar ที่อยู่ใน repo
          # ทำให้ gallery scan เจอรูปเก่าทั้งหมด ไม่ใช่แค่รูปล่าสุด
          if [ -d screenshots ]; then
            echo "Sidecar files in repo:"
            find screenshots/ -name "*.drive" -o -name "*.driveurl" 2>/dev/null | wc -l
          else
            echo "No screenshots/ folder in repo yet"
          fi

      - name: Run screenshot
        id: run_screenshot
        continue-on-error: true
        env:
          TV_SESSION_JSON:    ${{ secrets.TV_SESSION_JSON }}
          STOCKS_JSON:        ${{ secrets.STOCKS_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RCLONE_CONF:        ${{ secrets.RCLONE_CONF }}
          GALLERY_PASSWORD:   ${{ secrets.GALLERY_PASSWORD }}
        run: |
          DEBUG_FLAG=""
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            DEBUG_FLAG="--debug"
          fi
          python main.py --screenshot $DEBUG_FLAG

      - name: Log screenshot result
        if: always()
        run: |
          if [ "${{ steps.run_screenshot.outcome }}" = "success" ]; then
            echo "Screenshot step completed successfully"
          else
            echo "Screenshot step had errors (some symbols may have failed)"
          fi
          if [ -f app.log ]; then
            echo "-- Last 30 lines of app.log --"
            tail -n 30 app.log
          fi

      - name: Commit and push gallery
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # gallery HTML + data.json
          git add gallery/ --ignore-errors || true

          # sidecar files (.drive and .driveurl) — ให้ gallery อ่าน Drive URL ได้
          find screenshots/ -name "*.drive" -o -name "*.driveurl" 2>/dev/null \
            | xargs git add --ignore-errors 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new files — skipping commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: auto-update gallery ${TIMESTAMP} [skip ci]"
            git push origin HEAD
            echo "Gallery pushed to repo"
          fi

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            screenshots/
            app.log
          retention-days: 1
          if-no-files-found: ignore
