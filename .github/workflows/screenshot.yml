# ╔══════════════════════════════════════════════════════════════╗
# ║  .github/workflows/screenshot.yml                           ║
# ║  TradingView Auto Screenshot System — GitHub Actions         ║
# ╚══════════════════════════════════════════════════════════════╝

name: TradingView Auto Screenshot

on:
  schedule:
    # ทุกชั่วโมง ที่นาทีที่ 5 (UTC)
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug logging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ป้องกัน workflow ซ้อนกัน — ถ้า run ก่อนหน้ายังไม่เสร็จให้ skip
concurrency:
  group: screenshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  screenshot:
    name: Capture & Sync
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # ── Telegram ──────────────────────────────────────────────
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      # ── rclone ────────────────────────────────────────────────
      RCLONE_CONF:        ${{ secrets.RCLONE_CONF }}
      # ── Python ────────────────────────────────────────────────
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      # ────────────────────────────────────────────────────────────
      # 1. Checkout repo (ต้องใช้ token เพื่อ push gallery กลับ)
      # ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # fetch depth 1 เพียงพอ — ไม่ต้องการ full history
          fetch-depth: 1

      # ────────────────────────────────────────────────────────────
      # 2. Setup Python 3.11
      # ────────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ────────────────────────────────────────────────────────────
      # 3. Install rclone
      # ────────────────────────────────────────────────────────────
      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      # ────────────────────────────────────────────────────────────
      # 4. Install Python dependencies
      # ────────────────────────────────────────────────────────────
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ────────────────────────────────────────────────────────────
      # 5. Install Playwright + Chromium (with system dependencies)
      # ────────────────────────────────────────────────────────────
      - name: Install Playwright Chromium
        run: |
          playwright install chromium --with-deps

      # ────────────────────────────────────────────────────────────
      # 6. Write TradingView session cookies จาก secret
      #    DriveManager.setup_rclone_from_env() จัดการ rclone.conf
      # ────────────────────────────────────────────────────────────
      - name: Write TradingView session cookies
        env:
          TV_SESSION_JSON: ${{ secrets.TV_SESSION_JSON }}
        run: |
          # สร้าง Playwright profile directory
          mkdir -p ~/.pw_tv_profiles/Default

          # เขียน cookies.json สำหรับ Playwright context
          python - << 'PY_EOF'
          import os, json, pathlib

          session_raw = os.environ.get("TV_SESSION_JSON", "").strip()
          if not session_raw:
              print("WARNING: TV_SESSION_JSON secret is empty — will run without session")
          else:
              try:
                  cookies = json.loads(session_raw)
                  out_path = pathlib.Path.home() / ".pw_tv_profiles" / "Default" / "cookies.json"
                  out_path.write_text(json.dumps(cookies, ensure_ascii=False, indent=2), encoding="utf-8")
                  print(f"Session cookies written → {out_path}  ({len(cookies)} entries)")
              except json.JSONDecodeError as e:
                  print(f"ERROR: TV_SESSION_JSON is not valid JSON: {e}")
                  raise SystemExit(1)
          PY_EOF

      # ────────────────────────────────────────────────────────────
      # 7. Write stocks list จาก secret (ถ้ามี)
      #    ถ้า STOCKS_JSON ว่างจะใช้ stocks ที่อยู่ใน config.json
      # ────────────────────────────────────────────────────────────
      - name: Write stocks list from secret
        env:
          STOCKS_JSON: ${{ secrets.STOCKS_JSON }}
        run: |
          python - << 'PY_EOF'
          import os, json, pathlib

          stocks_raw = os.environ.get("STOCKS_JSON", "").strip()
          if not stocks_raw:
              print("INFO: STOCKS_JSON secret is empty — using stocks from config.json")
          else:
              try:
                  stocks = json.loads(stocks_raw)
                  # โหลด config.json เดิม แล้ว merge stocks เข้าไป
                  cfg_path = pathlib.Path("config.json")
                  if cfg_path.exists():
                      cfg = json.loads(cfg_path.read_text(encoding="utf-8"))
                  else:
                      cfg = {}
                  cfg["stocks"] = stocks
                  cfg_path.write_text(json.dumps(cfg, ensure_ascii=False, indent=2), encoding="utf-8")
                  print(f"Stocks list updated in config.json: {len(stocks)} symbols")
              except json.JSONDecodeError as e:
                  print(f"ERROR: STOCKS_JSON is not valid JSON: {e}")
                  raise SystemExit(1)
          PY_EOF

      # ────────────────────────────────────────────────────────────
      # 8. Run screenshot
      #    continue-on-error: true — workflow ไม่ล้มถ้า screenshot fail
      # ────────────────────────────────────────────────────────────
      - name: Run screenshot
        id: run_screenshot
        continue-on-error: true
        env:
          TV_SESSION_JSON:   ${{ secrets.TV_SESSION_JSON }}
          STOCKS_JSON:       ${{ secrets.STOCKS_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          RCLONE_CONF:       ${{ secrets.RCLONE_CONF }}
        run: |
          DEBUG_FLAG=""
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            DEBUG_FLAG="--debug"
          fi
          python main.py --screenshot $DEBUG_FLAG

      # ────────────────────────────────────────────────────────────
      # 9. Log screenshot result (always run — ดู status ได้แม้ fail)
      # ────────────────────────────────────────────────────────────
      - name: Log screenshot result
        if: always()
        run: |
          if [ "${{ steps.run_screenshot.outcome }}" = "success" ]; then
            echo "✅ Screenshot step completed successfully"
          else
            echo "⚠️  Screenshot step had errors (some symbols may have failed)"
            echo "This does not fail the workflow — partial success is OK"
          fi

          # แสดง log ล่าสุด (ถ้ามี)
          if [ -f app.log ]; then
            echo "── Last 30 lines of app.log ──"
            tail -n 30 app.log
          fi

      # ────────────────────────────────────────────────────────────
      # 10. Commit & push gallery/ กลับ repo
      #     เพื่อให้ GitHub Pages อัปเดตอัตโนมัติ
      # ────────────────────────────────────────────────────────────
      - name: Commit and push gallery
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # เพิ่ม gallery/ และ screenshots/ เข้า staging
          git add gallery/ --ignore-errors || true

          # ตรวจว่ามีอะไรเปลี่ยนจริงๆ ก่อน commit
          if git diff --cached --quiet; then
            echo "No new files in gallery/ — skipping commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: auto-update gallery ${TIMESTAMP} [skip ci]"
            git push origin HEAD
            echo "✅ Gallery pushed to repo"
          fi

      # ────────────────────────────────────────────────────────────
      # 11. Upload screenshots as artifact (optional — debug)
      #     เก็บ PNG ไว้ 1 วัน เพื่อ download ตรวจสอบได้
      # ────────────────────────────────────────────────────────────
      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            screenshots/
            app.log
          retention-days: 1
          # ไม่ fail ถ้าไม่มีไฟล์
          if-no-files-found: ignore
