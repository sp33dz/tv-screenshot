name: Rebuild Gallery Data

on:
  push:
    paths:
      - "screenshots/**/*.driveurl"
      - "screenshots/**/*.drive"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no write)"
        type: boolean
        default: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Rebuild data.json from sidecar files
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python rebuild_data_json.py --dry-run --verbose
          else
            python rebuild_data_json.py --verbose
          fi
        env:
          GALLERY_PASSWORD: ${{ secrets.GALLERY_PASSWORD }}

      - name: Commit rebuilt data.json
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery/data.json gallery/data.json.bak || true
          git diff --staged --quiet || \
            git commit -m "chore: rebuild data.json from sidecar files [skip ci]"
          git push
