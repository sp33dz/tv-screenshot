<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TradingView AutoShot — Chart Replay</title>
<style>
:root {
  --bg: #0d1117; --panel: #161b22; --border: #30363d;
  --accent: #00c896; --text: #e6edf3; --muted: #8b949e;
  --bull: #2ea043; --bear: #da3633;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
        display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Header toolbar ── */
#header {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap;
}
#header h1 { font-size: 14px; color: var(--accent); margin-right: 8px; white-space: nowrap; }
select, input[type=date] {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 6px 8px; border-radius: 6px; font-size: 13px;
}
select:focus, input:focus { outline: none; border-color: var(--accent); }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
  border: none; font-weight: 500; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.82; }
.btn-accent { background: var(--accent); color: #000; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-danger { background: transparent; border: 1px solid var(--bear); color: var(--bear); }
#frame-info { font-size: 12px; color: var(--muted); white-space: nowrap; }

/* ── Main image ── */
#viewport {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #000; position: relative; overflow: hidden;
  transition: flex 0.25s ease;
}

/* ── Theatre mode: viewport กินพื้นที่มากขึ้น ซ่อน header ── */
body.theatre #header        { display: none; }
body.theatre #scrubber-wrap { padding: 4px 16px 2px; }
body.theatre #controls      { padding: 6px 16px; }
body.theatre #viewport      { flex: 1 1 auto; }

/* ── Fullscreen (Fullscreen API) ── */
#viewport:fullscreen,
#viewport:-webkit-full-screen {
  background: #000;
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
#viewport:fullscreen .replay-buf,
#viewport:-webkit-full-screen .replay-buf {
  max-width: 100vw; max-height: 100vh;
}
/* mini HUD ที่ overlay ปรับขนาดเมื่อเต็มจอ */
#viewport:fullscreen #overlay,
#viewport:-webkit-full-screen #overlay {
  font-size: 15px; padding: 10px 16px;
}

/* ── Fullscreen button ── */
#btn-fullscreen {
  background: transparent; border: 1px solid var(--border); color: var(--text);
  padding: 5px 10px; border-radius: 6px; font-size: 14px; cursor: pointer;
  transition: border-color 0.15s, color 0.15s; line-height: 1;
}
#btn-fullscreen:hover { border-color: var(--accent); color: var(--accent); }

/* ── Theatre toggle button ── */
#btn-theatre {
  background: transparent; border: 1px solid var(--border); color: var(--text);
  padding: 5px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
#btn-theatre:hover { border-color: var(--accent); color: var(--accent); }
body.theatre #btn-theatre { border-color: var(--accent); color: var(--accent); }

/* ── Double-buffer: img-a / img-b วางซ้อนกัน absolute ── */
#viewport .replay-buf {
  position: absolute;
  /* ขนาดตั้งต้น — JS จะ override transform ด้วย zoom/pan */
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  user-select: none;
  display: block;
  top: 0; left: 0;           /* origin ไว้ที่ 0,0 — JS ดูแล translate */
  transform-origin: 0 0;     /* zoom จากมุมบนซ้าย — JS คำนวณ offset */
  transition: opacity 0.15s ease-in-out;
  will-change: transform, opacity;
  cursor: zoom-in;
}
/* เมื่อ pan mode */
body.panning #viewport .replay-buf { cursor: grabbing; }
#buf-a { opacity: 1; z-index: 2; }
#buf-b { opacity: 0; z-index: 1; }

/* ── Crosshair overlay ── */
#crosshair-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;      /* ไม่บัง mouse events */
  z-index: 6;
  opacity: 0;                /* ซ่อนเมื่อ mouse อยู่นอก viewport */
  transition: opacity 0.15s;
}
#viewport:hover #crosshair-canvas { opacity: 1; }

/* label พิกัด XY ── จะ position ด้วย JS */
#crosshair-label {
  position: absolute;
  background: rgba(0,0,0,0.72);
  color: #e6edf3;
  font-size: 11px; font-family: 'Consolas', 'Courier New', monospace;
  padding: 3px 7px; border-radius: 4px;
  pointer-events: none; z-index: 7;
  white-space: nowrap;
  opacity: 0; transition: opacity 0.15s;
  border: 1px solid rgba(255,255,255,0.12);
}
#viewport:hover #crosshair-label { opacity: 1; }

/* ── Zoom badge ── */
#zoom-badge {
  position: absolute; bottom: 12px; right: 14px;
  background: rgba(0,0,0,0.6); color: #e6edf3;
  font-size: 12px; padding: 3px 8px; border-radius: 4px;
  pointer-events: none; z-index: 8;
  opacity: 0; transition: opacity 0.3s;
}
#zoom-badge.visible { opacity: 1; }
/* ปุ่ม reset zoom */
#btn-zoom-reset {
  position: absolute; bottom: 12px; right: 72px;
  background: rgba(0,0,0,0.6); color: #e6edf3; border: 1px solid #30363d;
  font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer;
  z-index: 8; opacity: 0; transition: opacity 0.3s;
}
#btn-zoom-reset.visible { opacity: 1; }
#btn-zoom-reset:hover { border-color: var(--accent); color: var(--accent); }

/* ── Overlay info ── */
#overlay {
  position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.65);
  border-radius: 6px; padding: 8px 12px; font-size: 13px; line-height: 1.7;
  pointer-events: none; z-index: 5;
}
/* overlay fade-out ระหว่าง play ── จะ fade กลับมาเมื่อ pause หรือ hover */
body.playing #overlay    { opacity: 0.35; transition: opacity 0.4s; }
body.playing #viewport:hover #overlay { opacity: 1; }

/* ── Mini playback HUD ── แสดงตรงกลางล่าง viewport ขณะ fullscreen/theatre */
#play-hud {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  display: none; align-items: center; gap: 10px; z-index: 10;
  background: rgba(0,0,0,0.72); border-radius: 30px; padding: 7px 20px;
  pointer-events: auto; opacity: 0; transition: opacity 0.3s;
}
body.theatre #play-hud,
#viewport:fullscreen #play-hud,
#viewport:-webkit-full-screen #play-hud { display: flex; }
#viewport:hover #play-hud,
body.theatre #viewport:hover #play-hud  { opacity: 1; }
.hud-btn {
  background: none; border: none; color: #fff; font-size: 18px; cursor: pointer;
  padding: 2px 6px; border-radius: 4px; line-height: 1;
}
.hud-btn:hover { color: var(--accent); }
#hud-frame { font-size: 12px; color: #ccc; white-space: nowrap; min-width: 100px; text-align: center; }
#hud-speed { font-size: 12px; color: var(--accent); min-width: 30px; text-align: center; }

#no-img {
  position: absolute; color: var(--muted); font-size: 15px; text-align: center;
}

/* ── Timeline scrubber ── */
#scrubber-wrap {
  padding: 8px 16px 4px; background: var(--panel); border-top: 1px solid var(--border); flex-shrink: 0;
}
#scrubber { width: 100%; accent-color: var(--accent); cursor: pointer; }
#timeline-labels {
  display: flex; justify-content: space-between; font-size: 10px;
  color: var(--muted); margin-top: 2px; padding: 0 2px;
}

/* ── Controls ── */
#controls {
  background: var(--panel); border-top: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; flex-wrap: wrap;
}
#speed-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
#speed-range { accent-color: var(--accent); width: 100px; cursor: pointer; }
#note-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 6px 10px; border-radius: 6px; font-size: 13px; min-width: 140px;
}
#mark-sel {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 6px; border-radius: 6px; font-size: 13px;
}

/* ── Loading spinner ── */
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Password screen ── */
#pw-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; flex-direction: column; gap: 16px;
}
#pw-screen h2 { font-size: 18px; color: var(--accent); font-weight: 500; }
#pw-screen p  { font-size: 13px; color: var(--muted); }
#pw-box {
  background: var(--panel); border: 1px solid var(--border);
  color: var(--text); padding: 10px 16px; border-radius: 8px;
  font-size: 15px; width: 260px; text-align: center; outline: none;
}
#pw-box:focus { border-color: var(--accent); }
#pw-btn {
  background: var(--accent); color: #000; border: none;
  padding: 10px 32px; border-radius: 8px; font-size: 14px;
  font-weight: 600; cursor: pointer; width: 260px;
}
#pw-btn:hover { opacity: 0.85; }
#pw-err { color: #da3633; font-size: 13px; display: none; }
</style>
</head>
<body>

<div id="pw-screen">
  <h2>🔒 Chart Replay</h2>
  <p>Enter password to continue</p>
  <input id="pw-box" type="password" placeholder="Password"
         onkeydown="if(event.key==='Enter')checkPw()"/>
  <button id="pw-btn" onclick="checkPw()">Unlock</button>
  <span id="pw-err">Incorrect password — try again</span>
</div>

<!-- Header -->
<div id="header">
  <h1>▶ Chart Replay</h1>

  <select id="sel-symbol" onchange="onSymbolChange()">
    <option value="">— Symbol —</option>
  </select>
  <select id="sel-market" onchange="applySource()">
    <option value="">All Markets</option>
    <option value="CRYPTO">CRYPTO</option>
    <option value="US">US</option>
  </select>
  <select id="sel-drive" onchange="applySource()">
    <option value="">All Drives</option>
  </select>
  <select id="sel-tag" onchange="applySource()">
    <option value="">All Tags</option>
  </select>

  <input type="date" id="jump-date" title="Jump to date"/>
  <button class="btn btn-outline" onclick="jumpToDate()">Jump</button>

  <button id="btn-theatre"   onclick="toggleTheatre()" title="Theatre mode [T]">⬛ Theatre</button>
  <button id="btn-fullscreen" onclick="toggleFullscreen()" title="Fullscreen [F]">⛶</button>
  <button class="btn btn-outline" onclick="openGallery()">Gallery ↗</button>
  <span id="frame-info">—</span>
</div>

<!-- Viewport -->
<div id="viewport">
  <div id="no-img">Select a symbol to begin replay</div>
  <!-- Double-buffer: buf-a แสดงอยู่, buf-b โหลดถัดไป แล้ว swap -->
  <!-- คลิกรูปเพื่อเปิดต้นฉบับ (s0-v1) ใน tab ใหม่ -->
  <img id="buf-a" class="replay-buf" src="" alt="" style="display:none"/>
  <img id="buf-b" class="replay-buf" src="" alt="" style="display:none"/>
  <!-- Crosshair overlay -->
  <canvas id="crosshair-canvas"></canvas>
  <div id="crosshair-label"></div>
  <!-- loading spinner -->
  <div id="loading-ring" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
       width:40px;height:40px;border:3px solid #30363d;border-top-color:var(--accent);
       border-radius:50%;animation:spin 0.7s linear infinite;z-index:10;"></div>
  <!-- Zoom badge + reset -->
  <div id="zoom-badge">100%</div>
  <button id="btn-zoom-reset" onclick="zoomReset()" title="Reset zoom [0]">Reset zoom</button>
  <div id="overlay" style="display:none">
    <div id="ov-symbol" style="font-weight:600;color:var(--accent)"></div>
    <div id="ov-datetime" style="color:var(--text)"></div>
    <div id="ov-tag" style="color:#888"></div>
    <div id="ov-note" style="color:var(--note);margin-top:3px"></div>
  </div>
  <!-- Mini HUD — แสดงเฉพาะ theatre/fullscreen เมื่อ hover -->
  <div id="play-hud">
    <button class="hud-btn" onclick="stepFrame(-1)" title="Prev [←]">⏮</button>
    <button class="hud-btn" id="hud-play-btn" onclick="togglePlay()" title="Play/Pause [Space]">▶</button>
    <button class="hud-btn" onclick="stepFrame(1)"  title="Next [→]">⏭</button>
    <span id="hud-frame">— / —</span>
    <button class="hud-btn" onclick="changeHudSpeed(-1)" title="Slower">−</button>
    <span id="hud-speed">1×</span>
    <button class="hud-btn" onclick="changeHudSpeed(1)"  title="Faster">+</button>
    <button class="hud-btn" onclick="toggleFullscreen()" title="Exit fullscreen [F]">✕</button>
  </div>
</div>

<!-- Scrubber -->
<div id="scrubber-wrap">
  <input type="range" id="scrubber" min="0" max="0" value="0"
         oninput="onScrub()" onchange="onScrub()"/>
  <div id="timeline-labels">
    <span id="tl-start">—</span>
    <span id="tl-end">—</span>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="btn btn-outline" onclick="stepFrame(-1)" title="Previous [←]">⏮ Prev</button>
  <button class="btn btn-accent" id="play-btn" onclick="togglePlay()" title="Play/Pause [Space]">▶ Play</button>
  <button class="btn btn-outline" onclick="stepFrame(1)" title="Next [→]">Next ⏭</button>

  <span id="speed-label">Speed: <b id="speed-val">1×</b></span>
  <input type="range" id="speed-range" min="0" max="5" value="2" step="1" oninput="onSpeedChange()"/>

  <input id="note-input" type="text" placeholder="Note for this frame…"/>
  <select id="mark-sel">
    <option value="">No mark</option>
    <option value="BULL">🟢 Bull</option>
    <option value="BEAR">🔴 Bear</option>
    <option value="NOTE">📝 Note</option>
  </select>
  <button class="btn btn-outline" onclick="saveFrame()">Save Note</button>
</div>

function getAbsUrl(e) {

// ── Zoom / Pan engine ──────────────────────────────────────────────
// คำนวณขนาด fit-to-viewport ของภาพ (naturalWidth x naturalHeight)
function calcFit(natW, natH) {
  const vr = _vp.getBoundingClientRect();
  const scale = Math.min(vr.width / natW, vr.height / natH, 1);
  return { w: natW * scale, h: natH * scale, scale };
}

// apply zoom+pan transform ให้ทั้งสอง buffer พร้อมกัน
function applyZoom() {
  const vr  = _vp.getBoundingClientRect();
  // center offset: ทำให้ภาพที่ zoom=1 อยู่กลาง viewport
  const cx  = (vr.width  - vpFitW) / 2;
  const cy  = (vr.height - vpFitH) / 2;
  const tx  = cx + vpPanX;
  const ty  = cy + vpPanY;
  const t   = `translate(${tx}px,${ty}px) scale(${vpZoom})`;
  bufEl.a.style.transform = t;
  bufEl.b.style.transform = t;

  // badge
  const pct  = Math.round(vpZoom * 100) + '%';
  const badge = document.getElementById('zoom-badge');
  const resetBtn = document.getElementById('btn-zoom-reset');
  badge.textContent = pct;
  const zoomed = vpZoom !== 1.0 || vpPanX !== 0 || vpPanY !== 0;
  badge.classList.toggle('visible', true);
  resetBtn.classList.toggle('visible', zoomed);
  // auto-hide badge หลัง 1.5s
  clearTimeout(zoomBadgeTimer);
  zoomBadgeTimer = setTimeout(() => badge.classList.remove('visible'), 1500);
}

// กำหนด fit size ให้ buffer (เรียกเมื่อภาพโหลดสำเร็จ)
function setFitFromImg(imgEl) {
  if (!imgEl.naturalWidth) return;
  const f = calcFit(imgEl.naturalWidth, imgEl.naturalHeight);
  vpFitW = f.w;
  vpFitH = f.h;
  // set CSS size ให้ buf ตรงกับ fit size (ก่อน zoom)
  bufEl.a.style.width  = vpFitW + 'px';
  bufEl.a.style.height = vpFitH + 'px';
  bufEl.b.style.width  = vpFitW + 'px';
  bufEl.b.style.height = vpFitH + 'px';
  applyZoom();
}

// reset zoom กลับ 1:1 fit, pan = 0
function zoomReset() {
  vpZoom = 1.0; vpPanX = 0; vpPanY = 0;
  applyZoom();
}

// clamp pan ให้ภาพไม่หลุดออกนอก viewport มากเกินไป
function clampPan() {
  const vr   = _vp.getBoundingClientRect();
  const scaledW = vpFitW * vpZoom;
  const scaledH = vpFitH * vpZoom;
  // อนุญาตให้เลื่อนจนเหลือ 20% ของภาพอยู่ใน viewport
  const marginX = Math.max(scaledW * 0.2, 40);
  const marginY = Math.max(scaledH * 0.2, 40);
  const maxX =  (scaledW - vpFitW) / 2 + (vr.width  - vpFitW) / 2 + marginX;
  const minX = -(scaledW - vpFitW) / 2 - (vr.width  - vpFitW) / 2 - marginX + (vr.width  - vpFitW);
  const maxY =  (scaledH - vpFitH) / 2 + (vr.height - vpFitH) / 2 + marginY;
  const minY = -(scaledH - vpFitH) / 2 - (vr.height - vpFitH) / 2 - marginY + (vr.height - vpFitH);
  vpPanX = Math.min(maxX, Math.max(minX, vpPanX));
  vpPanY = Math.min(maxY, Math.max(minY, vpPanY));
}

// ── Mouse-wheel zoom (zoom toward cursor) ─────────────────────────
_vp.addEventListener('wheel', e => {
  e.preventDefault();
  const factor  = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  const newZoom = Math.min(Math.max(vpZoom * factor, 0.5), 10);
  if (newZoom === vpZoom) return;

  // zoom toward cursor position
  const vr = _vp.getBoundingClientRect();
  const cx = _vp.getBoundingClientRect();
  // cursor relative to viewport center
  const mx = e.clientX - vr.left;
  const my = e.clientY - vr.top;
  // offset ของจุดใต้ cursor ก่อน scale
  const originX = (vr.width  - vpFitW) / 2 + vpPanX;
  const originY = (vr.height - vpFitH) / 2 + vpPanY;
  // คำนวณตำแหน่งใน image space ก่อน zoom
  const imgX = (mx - originX) / vpZoom;
  const imgY = (my - originY) / vpZoom;
  // pan ใหม่ให้จุดนั้นยังอยู่ใต้ cursor
  vpPanX = mx - imgX * newZoom - (vr.width  - vpFitW) / 2;
  vpPanY = my - imgY * newZoom - (vr.height - vpFitH) / 2;
  vpZoom = newZoom;
  clampPan();
  applyZoom();
}, { passive: false });

// ── Mouse pan (drag ขณะ zoom > 1) ────────────────────────────────
_vp.addEventListener('mousedown', e => {
  // คลิกซ้ายเท่านั้น, ไม่ใช่ปุ่ม HUD
  if (e.button !== 0) return;
  if (e.target.closest('#play-hud')) return;
  if (vpZoom <= 1.0) return;    // ไม่ pan ถ้ายังไม่ zoom
  isPanning  = true;
  panStartX  = e.clientX - vpPanX;
  panStartY  = e.clientY - vpPanY;
  document.body.classList.add('panning');
  e.preventDefault();
});
window.addEventListener('mouseup', () => {
  if (!isPanning) return;
  isPanning = false;
  document.body.classList.remove('panning');
});

let _lastPinchDist = 0;
_vp.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    _lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
_vp.addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const dist = Math.hypot(
    e.touches[0].clientX - e.touches[1].clientX,
    e.touches[0].clientY - e.touches[1].clientY
  );
  if (_lastPinchDist === 0) { _lastPinchDist = dist; return; }
  const factor  = dist / _lastPinchDist;
  vpZoom = Math.min(Math.max(vpZoom * factor, 0.5), 10);
  _lastPinchDist = dist;
  clampPan();
  applyZoom();
}, { passive: false });

// ── Crosshair engine ───────────────────────────────────────────────
const _chCanvas = document.getElementById('crosshair-canvas');
const _chCtx    = _chCanvas.getContext('2d');
const _chLabel  = document.getElementById('crosshair-label');

// สี crosshair — เส้นหลัก + เส้นประ
const CH_COLOR      = 'rgba(255,255,255,0.75)';
const CH_DASH_COLOR = 'rgba(255,255,255,0.25)';
const CH_LINE_W     = 1;

// resize canvas ให้ตรงกับ viewport เสมอ
function resizeCrosshairCanvas() {
  const vr = _vp.getBoundingClientRect();
  _chCanvas.width  = vr.width;
  _chCanvas.height = vr.height;
}
resizeCrosshairCanvas();
new ResizeObserver(resizeCrosshairCanvas).observe(_vp);

// แปลง mouse position (relative to viewport) → image pixel coordinate
function viewportToImageCoords(mx, my) {
  if (!vpFitW || !vpFitH) return null;
  const vr = _vp.getBoundingClientRect();
  // origin ของภาพใน viewport (เหมือนที่ applyZoom คำนวณ)
  const originX = (vr.width  - vpFitW) / 2 + vpPanX;
  const originY = (vr.height - vpFitH) / 2 + vpPanY;
  // แปลงกลับ: image pixel = (mouse - origin) / zoom
  // แล้วหาร vpFitW,vpFitH เพื่อ normalize กลับเป็น natural size
  const activeEl = bufEl[activeBuf];
  const natW = activeEl.naturalWidth  || vpFitW;
  const natH = activeEl.naturalHeight || vpFitH;
  const imgX = (mx - originX) / vpZoom * (natW / vpFitW);
  const imgY = (my - originY) / vpZoom * (natH / vpFitH);
  return {
    x: Math.round(imgX),
    y: Math.round(imgY),
    natW, natH,
    // เปอร์เซ็นต์ของภาพ
    pctX: ((imgX / natW) * 100).toFixed(1),
    pctY: ((imgY / natH) * 100).toFixed(1),
    inImage: imgX >= 0 && imgX <= natW && imgY >= 0 && imgY <= natH,
  };
}

function drawCrosshair(mx, my) {
  const w = _chCanvas.width;
  const h = _chCanvas.height;
  _chCtx.clearRect(0, 0, w, h);

  // เส้นแนวตั้ง
  _chCtx.save();
  _chCtx.lineWidth   = CH_LINE_W;
  _chCtx.strokeStyle = CH_COLOR;
  _chCtx.setLineDash([]);
  _chCtx.beginPath();
  _chCtx.moveTo(mx, 0);
  _chCtx.lineTo(mx, h);
  _chCtx.stroke();

  // เส้นแนวนอน
  _chCtx.beginPath();
  _chCtx.moveTo(0, my);
  _chCtx.lineTo(w, my);
  _chCtx.stroke();

  // dot ตรงกลาง (จุด crosshair)
  _chCtx.fillStyle = CH_COLOR;
  _chCtx.beginPath();
  _chCtx.arc(mx, my, 3, 0, Math.PI * 2);
  _chCtx.fill();

  // วง circle เล็กรอบ dot
  _chCtx.strokeStyle = CH_COLOR;
  _chCtx.beginPath();
  _chCtx.arc(mx, my, 7, 0, Math.PI * 2);
  _chCtx.stroke();

  _chCtx.restore();
}

function updateCrosshairLabel(mx, my, coords) {
  if (!coords) { _chLabel.style.opacity = '0'; return; }

  // สร้าง label text
  let txt = 'X: ' + coords.x + '  Y: ' + coords.y;
  if (coords.inImage) {
    txt += '   (' + coords.pctX + '%, ' + coords.pctY + '%)';
  }
  _chLabel.textContent = txt;

  // วาง label ให้ไม่หลุดขอบ viewport
  const vr    = _vp.getBoundingClientRect();
  const lw    = _chLabel.offsetWidth  || 180;
  const lh    = _chLabel.offsetHeight || 22;
  const pad   = 12;
  let lx = mx + pad;
  let ly = my + pad;
  if (lx + lw > vr.width)  lx = mx - lw - pad;
  if (ly + lh > vr.height) ly = my - lh - pad;
  _chLabel.style.left = lx + 'px';
  _chLabel.style.top  = ly + 'px';
  _chLabel.style.opacity = '1';
}

// mousemove ใน viewport — วาด crosshair + อัปเดต label
_vp.addEventListener('mousemove', e => {
  const vr = _vp.getBoundingClientRect();
  const mx = e.clientX - vr.left;
  const my = e.clientY - vr.top;

  // pan ถ้ากำลัง drag
  if (isPanning) {
    vpPanX = e.clientX - panStartX;
    vpPanY = e.clientY - panStartY;
    clampPan();
    applyZoom();
  }

  // วาด crosshair เสมอเมื่อ mouse เข้า viewport
  drawCrosshair(mx, my);
  const coords = viewportToImageCoords(mx, my);
  updateCrosshairLabel(mx, my, coords);
});

// ล้าง crosshair เมื่อ mouse ออกนอก viewport
_vp.addEventListener('mouseleave', () => {
  _chCtx.clearRect(0, 0, _chCanvas.width, _chCanvas.height);
  _chLabel.style.opacity = '0';
});

// ── Preload engine ─────────────────────────────────────────────────
function preloadAround(centerIdx) {
  if (!source.length) return;

  const keep = new Set();
  const lo = Math.max(0, centerIdx - PRELOAD_BEHIND);
  const hi = Math.min(source.length - 1, centerIdx + PRELOAD_AHEAD);

  for (let i = lo; i <= hi; i++) {
    const url = getAbsUrl(source[i]);
    keep.add(url);
    if (!imgCache.has(url)) {
      const img = new Image();
      img.src = url;
      imgCache.set(url, img);
    }
  }

  // Evict entries outside the keep-window to limit memory
  for (const [url] of imgCache) {
    if (!keep.has(url)) imgCache.delete(url);
  }
}

// ── Double-buffer swap ─────────────────────────────────────────────
// แสดงภาพที่ absUrl บน buffer ถัดไป แล้ว cross-fade
// resolve() เมื่อภาพ onload (หรือ timeout 3 วินาที)
function swapToUrl(absUrl) {
  return new Promise(resolve => {
    const next   = activeBuf === 'a' ? 'b' : 'a';
    const cur    = activeBuf;
    const nextEl = bufEl[next];
    const curEl  = bufEl[cur];
    const spinner = document.getElementById('loading-ring');

    const cached = imgCache.get(absUrl);
    const alreadyLoaded = cached && cached.complete && cached.naturalWidth > 0;

    let resolved = false;
    const done = () => {
      if (resolved) return;
      resolved = true;
      spinner.style.display = 'none';

      // sync fit size จากภาพที่โหลดแล้ว
      setFitFromImg(nextEl);

      // cross-fade: next fade-in, cur fade-out
      nextEl.style.opacity = '1';
      nextEl.style.zIndex  = '2';
      curEl.style.opacity  = '0';
      curEl.style.zIndex   = '1';
      activeBuf = next;

      // cursor: ถ้า zoom > 1 ให้ grab, ไม่งั้น zoom-in
      nextEl.style.cursor = vpZoom > 1 ? 'grab' : 'zoom-in';
      curEl.style.cursor  = nextEl.style.cursor;

      resolve();
    };

    const guard = setTimeout(done, 3000);

    nextEl.onload  = () => { clearTimeout(guard); done(); };
    nextEl.onerror = () => { clearTimeout(guard); done(); };
    nextEl.style.display = '';
    // pre-apply transform ก่อน load เพื่อไม่ให้กระตุก
    applyZoom();
    nextEl.src = absUrl;

    if (alreadyLoaded) {
      clearTimeout(guard);
      nextEl.onload = nextEl.onerror = null;
      Promise.resolve().then(done);
    } else {
      spinner.style.display = '';
    }

    curEl.style.display = '';
  });
}

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  try {
    ALL   = _INLINE_DATA.entries || [];
    fillSymbols(_INLINE_DATA.symbols || []);
    fillTags(_INLINE_DATA.tags || []);
    fillDrives(_INLINE_DATA.drives || []);
    NOTES = Object.assign({}, _INLINE_NOTES);

    if (window.location.protocol === 'file:') {
      try {
        const stored = localStorage.getItem('tv_notes');
        if (stored) NOTES = Object.assign({}, NOTES, JSON.parse(stored));
      } catch(_) {}
    }

    if (window.location.protocol !== 'file:') {
      try {
        const [dr, nr] = await Promise.allSettled([
          fetch('data.json').then(r => r.json()),
          fetch('notes.json').then(r => r.json()),
        ]);
        if (dr.status === 'fulfilled' && dr.value && dr.value.entries) {
          const serverEntries = dr.value.entries || [];
          const inlineEntries = _INLINE_DATA.entries || [];
          const pathSet = new Set(serverEntries.map(e => e.path));
          const merged  = [...serverEntries];
          inlineEntries.forEach(e => { if (!pathSet.has(e.path)) merged.push(e); });
          ALL = merged;
          const allSyms = [...new Set(merged.map(e => e.symbol))].sort();
          const allTags = [...new Set(merged.map(e => e.tag).filter(Boolean))].sort();
          const allDrvs = [...new Set(merged.map(e => e.drive_name).filter(Boolean))].sort();
          fillSymbols(allSyms);
          fillTags(allTags);
          fillDrives(allDrvs);
        }
        if (nr.status === 'fulfilled') NOTES = nr.value;
      } catch(_) {}
    }
  } catch(e) { console.error(e); }
}

function fillSymbols(syms) {
  const sel = document.getElementById('sel-symbol');
  const first = sel.options[0];
  sel.innerHTML = '';
  sel.appendChild(first);
  syms.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

function fillTags(tags) {
  const sel = document.getElementById('sel-tag');
  const first = sel.options[0];
  sel.innerHTML = '';
  sel.appendChild(first);
  tags.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
}

function fillDrives(drives) {
  const sel = document.getElementById('sel-drive');
  const first = sel.options[0];
  sel.innerHTML = '';
  sel.appendChild(first);
  (drives || []).forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    sel.appendChild(o);
  });
}

// ── Source / filters ──────────────────────────────────────────────
function onSymbolChange() { applySource(); }

function applySource() {
  const sym = document.getElementById('sel-symbol').value;
  const mkt = document.getElementById('sel-market').value;
  const drv = document.getElementById('sel-drive').value;
  const tag = document.getElementById('sel-tag').value;

  clearTimeout(timer);
  playing = false;
  document.getElementById('play-btn').textContent = '▶ Play';

  if (!sym) {
    source = [];
    imgCache.clear();
    renderFrame();
    return;
  }

  source = ALL.filter(e =>
    e.symbol === sym &&
    (!mkt || e.market === mkt) &&
    (!drv || e.drive_name === drv) &&
    (!tag || e.tag === tag)
  ).sort((a, b) => (a.sort_key || '').localeCompare(b.sort_key || ''));

  idx = 0;
  imgCache.clear();
  const scrub = document.getElementById('scrubber');
  scrub.max   = Math.max(0, source.length - 1);
  scrub.value = 0;
  updateTimeline();
  syncHud();
  renderFrame();
}

function updateTimeline() {
  const tls = document.getElementById('tl-start');
  const tle = document.getElementById('tl-end');
  if (source.length) {
    tls.textContent = source[0].date;
    tle.textContent = source[source.length - 1].date;
  } else {
    tls.textContent = tle.textContent = '—';
  }
}

// ── Playback — drift-corrected scheduler ──────────────────────────
function togglePlay() {
  playing = !playing;
  const label = playing ? '⏸' : '▶';
  document.getElementById('play-btn').textContent     = playing ? '⏸ Pause' : '▶ Play';
  document.getElementById('hud-play-btn').textContent = label;
  document.body.classList.toggle('playing', playing);
  if (playing) advanceFrame();
  else clearTimeout(timer);
}

// advanceFrame: advance idx → renderFrame → wait remaining time → repeat
// ใช้ Date.now() วัดเวลาจริง เพื่อชดเชย network latency
async function advanceFrame() {
  if (!playing) return;
  if (idx >= source.length - 1) {
    playing = false;
    document.getElementById('play-btn').textContent     = '▶ Play';
    document.getElementById('hud-play-btn').textContent = '▶';
    document.body.classList.remove('playing');
    return;
  }

  const targetMs = 1000 / SPEEDS[speedIdx];
  const t0 = Date.now();

  idx++;
  syncScrubber();
  syncHud();
  await renderFrame();

  if (!playing) return;

  const elapsed = Date.now() - t0;
  const wait    = Math.max(0, targetMs - elapsed);
  timer = setTimeout(advanceFrame, wait);
}

// ── Theatre mode ──────────────────────────────────────────────────
function toggleTheatre() {
  document.body.classList.toggle('theatre');
}

// ── Fullscreen (Fullscreen API) ───────────────────────────────────
function toggleFullscreen() {
  const vp = document.getElementById('viewport');
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  if (!fsEl) {
    // เข้าเต็มจอ
    (vp.requestFullscreen || vp.webkitRequestFullscreen).call(vp);
  } else {
    // ออกเต็มจอ
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}
// อัปเดตไอคอน fullscreen button เมื่อ state เปลี่ยน
document.addEventListener('fullscreenchange',        _onFsChange);
document.addEventListener('webkitfullscreenchange',  _onFsChange);
function _onFsChange() {
  const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.getElementById('btn-fullscreen').textContent = inFs ? '⛶' : '⛶';
  document.getElementById('btn-fullscreen').title       = inFs ? 'Exit Fullscreen [F]' : 'Fullscreen [F]';
}

// ── HUD sync ─────────────────────────────────────────────────────
function syncHud() {
  document.getElementById('hud-frame').textContent =
    source.length ? (idx + 1) + ' / ' + source.length : '— / —';
  document.getElementById('hud-speed').textContent = SPEEDS[speedIdx] + '×';
}

// ── HUD speed ±1 step ─────────────────────────────────────────────
function changeHudSpeed(dir) {
  speedIdx = Math.max(0, Math.min(SPEEDS.length - 1, speedIdx + dir));
  document.getElementById('speed-range').value = speedIdx;
  document.getElementById('speed-val').textContent = SPEEDS[speedIdx] + '×';
  syncHud();
}

function stepFrame(d) {
  clearTimeout(timer);
  playing = false;
  document.getElementById('play-btn').textContent     = '▶ Play';
  document.getElementById('hud-play-btn').textContent = '▶';
  document.body.classList.remove('playing');
  idx = Math.max(0, Math.min(source.length - 1, idx + d));
  syncScrubber();
  syncHud();
  renderFrame();
}

function onScrub() {
  idx = parseInt(document.getElementById('scrubber').value, 10);
  renderFrame();
}

function syncScrubber() {
  document.getElementById('scrubber').value = idx;
}

function onSpeedChange() {
  speedIdx = parseInt(document.getElementById('speed-range').value, 10);
  document.getElementById('speed-val').textContent = SPEEDS[speedIdx] + '×';
}

function jumpToDate() {
  const d = document.getElementById('jump-date').value;
  if (!d || !source.length) return;
  const i = source.findIndex(e => e.date >= d);
  if (i >= 0) { idx = i; syncScrubber(); renderFrame(); }
}

// ── Render (async — รอ double-buffer swap) ─────────────────────────
async function renderFrame() {
  const noImg   = document.getElementById('no-img');
  const overlay = document.getElementById('overlay');

  if (!source.length) {
    bufEl.a.style.display = bufEl.b.style.display = 'none';
    noImg.style.display   = '';
    overlay.style.display = 'none';
    document.getElementById('frame-info').textContent = '—';
    return;
  }

  noImg.style.display = 'none';

  const e      = source[idx];
  const absUrl = getAbsUrl(e);

  // เริ่ม preload ภาพรอบข้างทันที (non-blocking)
  preloadAround(idx);

  // swap buffer → cross-fade
  await swapToUrl(absUrl);

  // อัปเดต overlay + UI
  overlay.style.display = '';
  document.getElementById('ov-symbol').textContent   = e.symbol + ' · ' + e.market;
  document.getElementById('ov-datetime').textContent = e.datetime_str;
  document.getElementById('ov-tag').textContent      = e.tag || '';

  const n = NOTES[e.path];
  document.getElementById('ov-note').textContent     = n?.note ? '📝 ' + n.note : '';
  document.getElementById('note-input').value        = n?.note || '';
  document.getElementById('mark-sel').value          = n?.trade_mark || '';

  document.getElementById('frame-info').textContent =
    'Frame ' + (idx + 1) + ' / ' + source.length + ' — ' + e.datetime_str;
}

// ── Annotation ────────────────────────────────────────────────────
async function saveFrame() {
  if (!source.length) return;
  const e    = source[idx];
  const note = document.getElementById('note-input').value.trim();
  const mark = document.getElementById('mark-sel').value;
  NOTES[e.path] = { path: e.path, note, trade_mark: mark, updated_at: new Date().toISOString() };
  if (window.location.protocol === 'file:') {
    try { localStorage.setItem('tv_notes', JSON.stringify(NOTES)); } catch(_) {}
  } else {
    try {
      await fetch('/save_note', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: e.path, note, trade_mark: mark }),
      });
    } catch(_) {}
  }
  renderFrame();
}

function openGallery() { window.open('index.html', '_blank'); }

// ── Keyboard ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft')              stepFrame(-1);
  if (e.key === 'ArrowRight')             stepFrame(1);
  if (e.key === ' ')                      { e.preventDefault(); togglePlay(); }
  if (e.key === 'f' || e.key === 'F')     toggleFullscreen();
  if (e.key === 't' || e.key === 'T')     toggleTheatre();
  if (e.key === '0')                      zoomReset();
  if (e.key === '+' || e.key === '=') {
    // zoom in 15% at center
    const vr = _vp.getBoundingClientRect();
    const mx = vr.width / 2; const my = vr.height / 2;
    const newZoom = Math.min(vpZoom * 1.15, 10);
    const originX = (vr.width  - vpFitW) / 2 + vpPanX;
    const originY = (vr.height - vpFitH) / 2 + vpPanY;
    const imgX = (mx - originX) / vpZoom;
    const imgY = (my - originY) / vpZoom;
    vpPanX = mx - imgX * newZoom - (vr.width  - vpFitW) / 2;
    vpPanY = my - imgY * newZoom - (vr.height - vpFitH) / 2;
    vpZoom = newZoom; clampPan(); applyZoom();
  }
  if (e.key === '-' || e.key === '_') {
    const vr = _vp.getBoundingClientRect();
    const mx = vr.width / 2; const my = vr.height / 2;
    const newZoom = Math.max(vpZoom / 1.15, 0.5);
    const originX = (vr.width  - vpFitW) / 2 + vpPanX;
    const originY = (vr.height - vpFitH) / 2 + vpPanY;
    const imgX = (mx - originX) / vpZoom;
    const imgY = (my - originY) / vpZoom;
    vpPanX = mx - imgX * newZoom - (vr.width  - vpFitW) / 2;
    vpPanY = my - imgY * newZoom - (vr.height - vpFitH) / 2;
    vpZoom = newZoom; clampPan(); applyZoom();
  }
});

// ── Speed init ────────────────────────────────────────────────────
document.getElementById('speed-range').value = DEFAULT_SPEED_IDX;
document.getElementById('speed-val').textContent = SPEEDS[DEFAULT_SPEED_IDX] + '×';

/* ═══════════════════════════════════════════════
   Password gate
═══════════════════════════════════════════════ */
const _PW_HASH = '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92';

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPw() {
  const val  = document.getElementById('pw-box').value;
  const hash = await sha256hex(val);
  if (hash === _PW_HASH) {
    sessionStorage.setItem('tv_auth', hash);
    document.getElementById('pw-screen').style.display = 'none';
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw-box').value = '';
    document.getElementById('pw-box').focus();
  }
}

(async () => {
  if (!_PW_HASH) {
    document.getElementById('pw-screen').style.display = 'none';
  } else {
    const saved = sessionStorage.getItem('tv_auth');
    if (saved === _PW_HASH) {
      document.getElementById('pw-screen').style.display = 'none';
    } else {
      document.getElementById('pw-box').focus();
      return;
    }
  }
  init();
})();
